version: 2
updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    groups:
      development-tooling:
        patterns:
          - mypy
          - pre-commit
          - pytest
          - ruff
          - httpx
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
