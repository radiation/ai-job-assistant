name: Validate

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies from lockfile
        run: uv sync --frozen --all-groups

      - name: Run Ruff, format check, and mypy
        run: uv run ai-job-finder-fast-checks

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies from lockfile
        run: uv sync --frozen --all-groups

      - name: Run unit tests
        run: uv run ai-job-finder-tests --unit

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: ai_job_finder_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_job_finder_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/ai_job_finder_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies from lockfile
        run: uv sync --frozen --all-groups

      - name: Run integration tests against PostgreSQL
        run: uv run ai-job-finder-tests --integration --require-postgres
