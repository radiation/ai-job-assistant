repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
      - id: check-toml
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check --fix
        entry: uv run ruff check --fix .
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format .
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: mypy
        name: mypy
        entry: uv run mypy .
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: pytest-postgres
        name: pytest (PostgreSQL)
        entry: uv run ai-job-finder-tests --require-postgres
        language: system
        pass_filenames: false
        stages: [pre-push]
