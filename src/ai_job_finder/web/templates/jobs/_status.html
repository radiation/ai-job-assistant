<article class="panel" id="job-status-panel">
  <h2>Posting status</h2>
  <p><span class="badge badge-status">{{ job.posting_status|humanize }}</span></p>

  <form
    class="stack-form compact-form"
    method="post"
    action="/jobs/{{ job.id }}/status"
    hx-post="/jobs/{{ job.id }}/status"
    hx-target="#job-status-panel"
    hx-swap="outerHTML"
  >
    <label for="posting_status">Update status</label>
    <div class="inline-controls">
      <select id="posting_status" name="posting_status">
        {% for option in posting_statuses %}
          <option value="{{ option.value }}" {% if option.value == job.posting_status %}selected{% endif %}>{{ option.value|humanize }}</option>
        {% endfor %}
      </select>
      <button type="submit">Save status</button>
    </div>
    {% if status_error %}<p class="field-error">{{ status_error }}</p>{% endif %}
  </form>
</article>
