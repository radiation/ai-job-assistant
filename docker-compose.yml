services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ai_job_finder
      POSTGRES_TEST_DB: ai_job_finder_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_job_finder"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  migrate:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/ai_job_finder}
      TEST_DATABASE_URL: ${TEST_DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/ai_job_finder_test}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      ENABLE_DEV_RESET_API: ${ENABLE_DEV_RESET_API:-true}
      LOCAL_DOCUMENT_STORAGE_DIR: ${LOCAL_DOCUMENT_STORAGE_DIR:-/app/.local/document-storage}
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini:ro
      - app-venv:/app/.venv
    command: ["/app/.venv/bin/alembic", "upgrade", "head"]
    restart: "no"

  app:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/ai_job_finder}
      TEST_DATABASE_URL: ${TEST_DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/ai_job_finder_test}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      ENABLE_DEV_RESET_API: ${ENABLE_DEV_RESET_API:-true}
      EXTRACTION_ENABLED: ${EXTRACTION_ENABLED:-false}
      EXTRACTION_PROVIDER: ${EXTRACTION_PROVIDER:-vertex}
      VERTEX_PROJECT: ${VERTEX_PROJECT:-}
      VERTEX_REGION: ${VERTEX_REGION:-}
      VERTEX_GEMINI_MODEL_ID: ${VERTEX_GEMINI_MODEL_ID:-gemini-2.5-flash}
      EXTRACTION_PROMPT_VERSION: ${EXTRACTION_PROMPT_VERSION:-career_fact_extraction_v1}
      EXTRACTION_SCHEMA_VERSION: ${EXTRACTION_SCHEMA_VERSION:-career_fact_extraction_schema_v1}
      EXTRACTION_TEMPERATURE: ${EXTRACTION_TEMPERATURE:-0}
      EXTRACTION_TIMEOUT_SECONDS: ${EXTRACTION_TIMEOUT_SECONDS:-30}
      EXTRACTION_CHUNK_SIZE: ${EXTRACTION_CHUNK_SIZE:-12000}
      EXTRACTION_MAX_CHUNKS: ${EXTRACTION_MAX_CHUNKS:-8}
      EXTRACTION_MAX_EXTRACTED_CHARACTERS: ${EXTRACTION_MAX_EXTRACTED_CHARACTERS:-80000}
      MAX_UPLOAD_SIZE_BYTES: ${MAX_UPLOAD_SIZE_BYTES:-5242880}
      LOCAL_DOCUMENT_STORAGE_DIR: ${LOCAL_DOCUMENT_STORAGE_DIR:-/app/.local/document-storage}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini:ro
      - app-venv:/app/.venv
      - document-storage:/app/.local/document-storage
    command:
      [
        "/app/.venv/bin/uvicorn",
        "ai_job_finder.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "/app/src",
      ]

volumes:
  postgres-data:
  app-venv:
  document-storage:
